<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #f5f3f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(220,50,47,0.08) 0%, transparent 70%);
  }
  .left {
    flex: 1;
    padding: 80px 40px 80px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 1;
  }
  h1 {
    font-size: 72px;
    font-weight: 900;
    color: #1a1a1f;
    letter-spacing: -3px;
    line-height: 1;
    margin-bottom: 20px;
  }
  h1 span { color: #dc322f; }
  p {
    font-size: 22px;
    color: #6b6878;
    line-height: 1.5;
    max-width: 540px;
  }
  p strong { color: #1a1a1f; }
  .stats {
    display: flex;
    gap: 40px;
    margin-top: 40px;
  }
  .stat-value {
    font-family: 'Courier New', monospace;
    font-size: 28px;
    font-weight: bold;
    color: #dc322f;
  }
  .stat-label {
    font-size: 12px;
    color: #6b6878;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .right {
    width: 400px;
    padding-right: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .right img {
    width: 280px;
    filter: drop-shadow(0 0 40px rgba(220,50,47,0.1));
  }
</style>
</head>
<body>
  <div class="left">
    <h1>Scal<span>ex</span></h1>
    <p>Scala code intelligence for AI coding agents.<br><strong>~3,100 lines. Zero compilation. Just answers.</strong></p>
    <div class="stats">
      <div>
        <div class="stat-value">214k</div>
        <div class="stat-label">Symbols</div>
      </div>
      <div>
        <div class="stat-value">~1s</div>
        <div class="stat-label">Query Time</div>
      </div>
      <div>
        <div class="stat-value">0</div>
        <div class="stat-label">Build Server</div>
      </div>
    </div>
  </div>
  <div class="right">
    <img src="Kestrel.png" alt="Scalex">
  </div>
</body>
</html>
