name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: scalex-macos-arm64
          - os: macos-15-intel
            artifact: scalex-macos-x64
          - os: ubuntu-24.04
            artifact: scalex-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true
          jvm: graalvm-java21

      - name: Build native image
        run: |
          scala-cli --power package --native-image scalex.scala \
            -o ${{ matrix.artifact }} \
            --force \
            -- --no-fallback \
            --initialize-at-run-time=com.google.common.hash.Striped64,com.google.common.hash.LongAdder,com.google.common.hash.BloomFilter,com.google.common.hash.BloomFilterStrategies

      - name: Test binary
        run: |
          ./${{ matrix.artifact }} help
          ./${{ matrix.artifact }} index .
          ./${{ matrix.artifact }} search . Scalex
          ./${{ matrix.artifact }} def . SymbolKind
          ./${{ matrix.artifact }} symbols . scalex.scala

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Make binaries executable
        run: chmod +x artifacts/*/scalex-macos-* artifacts/*/scalex-linux-*

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/scalex-*
          body: ${{ steps.changelog.outputs.body }}
