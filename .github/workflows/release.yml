name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-scalex:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: scalex-macos-arm64
          - os: macos-15-intel
            artifact: scalex-macos-x64
          - os: ubuntu-24.04
            artifact: scalex-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: graalvm/setup-graalvm@03e8abf916fd0e281b2efe7b2da3378bb0a1d085 # v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: VirtusLab/scala-cli-setup@59e308800210b0414d2d7190068c80021e1b3e5d # v1
        with:
          power: true
          jvm: graalvm-java21

      - name: Build native image
        run: ./build-native.sh ${{ matrix.artifact }}

      - name: Test binary
        run: |
          ./${{ matrix.artifact }} help
          ./${{ matrix.artifact }} index .
          ./${{ matrix.artifact }} search . Scalex
          ./${{ matrix.artifact }} def . SymbolKind
          ./${{ matrix.artifact }} symbols . src/model.scala

      - name: Generate checksum
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  build-scalex-semanticdb:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: VirtusLab/scala-cli-setup@59e308800210b0414d2d7190068c80021e1b3e5d # v1
        with:
          power: true

      - name: Build assembly JAR
        run: ./build-native-semanticdb.sh scalex-sdb

      - name: Test binary
        run: |
          ./scalex-sdb --help
          ./scalex-sdb --version

      - name: Generate checksum
        run: shasum -a 256 scalex-sdb > scalex-sdb.sha256

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: scalex-sdb
          path: |
            scalex-sdb
            scalex-sdb.sha256

  release:
    needs: [build-scalex, build-scalex-semanticdb]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Make binaries executable
        run: chmod +x artifacts/*/scalex-*

      - name: Generate combined checksums
        run: |
          cd artifacts
          shasum -a 256 \
            */scalex-macos-arm64 */scalex-macos-x64 */scalex-linux-x64 \
            */scalex-sdb \
            | sed 's|[^/]*/||' > ../checksums.txt
          cd ..
          echo "Generated checksums.txt:"
          cat checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            artifacts/*/scalex-macos-arm64
            artifacts/*/scalex-macos-x64
            artifacts/*/scalex-linux-x64
            artifacts/*/scalex-sdb

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/*/scalex-*
            checksums.txt
          body: ${{ steps.changelog.outputs.body }}
